project_name: ocean-heat-flux-kan
seed: 42

data:
  data_dir: ./data
  output_dir: ./outputs
  mask_filename: mask
  grid:
    height: 161
    width: 181
  date_range:
    start: 2019-01-01
    end: 2025-10-31
  split:
    train_end: 2023-12-31
    val_start: 2024-01-01
    val_end: 2024-12-31
    test_start: 2025-01-01
    test_end: 2025-10-17
  file_map:
    SST: SST_2019-2026.npy
    U: U_2019-2026.npy
    V: V_2019-2026.npy
    LATENT: LATENT_2019-2026.npy
    SENSIBLE: SENSIBLE_2019-2026.npy
  channels: [SST, U, V, LAT, LON]
  target_key: LATENT
  target_mode: absolute
  input_window: 30
  horizons: [3, 7, 14]

train:
  batch_size: 4
  epochs: 12
  lr: 5.0e-5
  weight_decay: 1.0e-4
  num_workers: 0
  device: cuda

model:
  hidden_dim: 32
  head: conv_det
  head_params:
    kan_hidden: 64
    rbf_bins: 16
    dropout: 0.0

loss:
  deterministic_alpha: 0.7
  gaussian_aux_mae_weight: 0.1

logging:
  save_every_epoch: false
